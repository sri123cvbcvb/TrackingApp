version: '3.8'

services:

  # ─── MySQL Database ───────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: tracker-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-tracker_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-trackingdb}
      MYSQL_USER: ${MYSQL_USER:-tracker}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tracker_pass}
    ports:
      # Host port 3305 to avoid conflict with local MySQL on 3306
      - "3305:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-tracker_root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - tracker-network

  # ─── Spring Boot Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tracker-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-trackingdb}
      DB_USERNAME: ${MYSQL_USER:-tracker}
      DB_PASSWORD: ${MYSQL_PASSWORD:-tracker_pass}
      ALLOWED_ORIGINS: "http://localhost:3000,http://frontend"
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - tracker-network

  # ─── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tracker-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - tracker-network

# ─── Volumes & Networks ───────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

networks:
  tracker-network:
    driver: bridge
