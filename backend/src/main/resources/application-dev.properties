# ─── Development Profile ────────────────────────────────────────────────────
# For local development — can use a local PostgreSQL or your Neon dev branch.
# Copy this file's values into a local .env file (never commit .env).

server.port=8080

# Option A: Neon (same connection string as prod — use a dev branch in Neon for isolation)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/trackingdb}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

tracker.websocket.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
tracker.app.base-url=${APP_BASE_URL:http://localhost:3000}

logging.level.com.tracker=DEBUG
logging.level.org.hibernate.SQL=DEBUG
