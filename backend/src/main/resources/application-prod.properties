# ─── Production Profile (Render + Neon) ─────────────────────────────────────
# All values come from Render environment variables.
# Never commit actual values — set them in the Render dashboard.

# Server port — Render sets PORT automatically
server.port=${PORT:8080}

# Neon PostgreSQL connection
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool — keep small for Neon serverless tier
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Allowed origins from env var (set to your Vercel URL on Render)
# Default to * so the app doesn't crash if env var is not yet configured
tracker.websocket.allowed-origins=${ALLOWED_ORIGINS:*}
tracker.app.base-url=${APP_BASE_URL:https://localhost:3000}

# Reduce log noise in production
logging.level.com.tracker=INFO
logging.level.org.springframework.web.socket=WARN
logging.level.org.hibernate.SQL=WARN
